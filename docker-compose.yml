services:
  # 1. PostgreSQL Database Service
  db:
    image: postgres:15-alpine
    container_name: wtvision_db
    environment:
      POSTGRES_DB: credentials_db
      POSTGRES_USER: superuser
      POSTGRES_PASSWORD: ${ADMIN_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - wtvision_net

  # 2. JWT Auth Microservice
  jwt_authservice:
    build: ./jwt_authservice
    container_name: wtvision_authservice
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8001"
    environment:
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - DB_HOST=${DB_HOST:-db}
      - DB_NAME=credentials_db
      - DB_USER=superuser
      - DB_PORT=5432
    ports:
      - "8001:8001"
    volumes:
      - ./jwt_authservice:/app
    depends_on:
      - db
    networks:
      - wtvision_net

  # 3. Downstream Django API Backend
  wtvisionbe:
    build: ./wtvisionbe
    container_name: wtvision_backend
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    environment:
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - DB_HOST=${DB_HOST:-db}
      - DB_NAME=credentials_db
      - DB_USER=superuser
      - DB_PORT=5432
    ports:
      - "8000:8000"
    volumes:
      - ./wtvisionbe:/app
    depends_on:
      - db
    networks:
      - wtvision_net

  # 4. Express API Gateway
  gateway:
    build: ./wtvision-gateway
    container_name: wtvision_gateway
    ports:
      - "80:80"
    environment:
      - PORT=80
      - BACKEND_URL=${BACKEND_URL:-http://wtvisionbe:8000}
      - RENTALS_BACKEND_URL=${RENTALS_BACKEND_URL:-http://rentals_backend:5000}
      - TRADING_BACKEND_URL=${TRADING_BACKEND_URL:-http://upstox-backend:8081}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./wtvision-gateway:/app
      - /app/node_modules
    depends_on:
      - jwt_authservice
      - wtvisionbe
      - rentals_backend
      - upstox-backend
    networks:
      - wtvision_net

  # 5. Next.js React Frontend
  frontend:
    build: ./wtvisionfe
    container_name: wtvision_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./wtvisionfe:/app
      - /app/node_modules
    depends_on:
      - gateway
    networks:
      - wtvision_net

  # 6. Redis Caching & Rate-Limiting Service
  redis:
    image: redis:7-alpine
    container_name: wtvision_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - wtvision_net

  # 7. Rentals Backend Service
  rentals_backend:
    build: ./rentals_app/rentals_backend
    container_name: rentals_backend
    command: sh -c "npx prisma db push && npx tsx src/seed.ts && npm run dev"
    environment:
      - DATABASE_URL=postgresql://superuser:${ADMIN_PASSWORD}@db:5432/credentials_db?schema=rentals
    ports:
      - "5000:5000"
    volumes:
      - ./rentals_app/rentals_backend:/app
      - /app/node_modules
    depends_on:
      - db
    networks:
      - wtvision_net

  # 8. Rentals Frontend Service
  rentals_frontend:
    build: ./rentals_app/rentals_frontend
    container_name: rentals_frontend
    ports:
      - "3001:3001"
    volumes:
      - ./rentals_app/rentals_frontend:/app
      - /app/node_modules
    depends_on:
      - rentals_backend
    networks:
      - wtvision_net

  # 9. Upstox Python Learning/Strategy Service
  upstox-learner:
    build:
      context: ./algo_trading/MarketPredictor
      dockerfile: ../BrokerBackends/UpstoxJavaBackend/Dockerfile.python
    container_name: upstox-learner
    working_dir: /app/MarketPredictor
    command: python core/strategy_service.py
    ports:
      - "50052:50051"
      - "5003:5000"
    environment:
      - PYTHONUNBUFFERED=1
      - GRPC_PORT=50051
      - FLASK_PORT=5000
      - GRPC_MAX_MESSAGE_LENGTH=104857600
      - UPSTOX_ANALYTICS_TOKEN=${UPSTOX_ANALYTICS_TOKEN}
      - DB_HOST=${DB_HOST:-db}
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-algotrading_db}
      - DB_USER=superuser
      - DB_PASSWORD=${ADMIN_PASSWORD}
      - DB_SCHEMA=${DB_SCHEMA:-public}
      - PYTHONPATH=/app/MarketPredictor
    volumes:
      - ./algo_trading:/app
    networks:
      - wtvision_net
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:5000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # 10. Upstox Java Spring Boot Backend
  upstox-backend:
    build:
      context: ./algo_trading/BrokerBackends/UpstoxJavaBackend
      dockerfile: Dockerfile.java
    container_name: upstox-backend
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - UPSTOX_ANALYTICS_TOKEN=${UPSTOX_ANALYTICS_TOKEN}
      - PYTHON_SERVICE_URL=upstox-learner:50051
      - MAX_POSITION_SIZE=100000.0
      - MAX_DAILY_LOSS=50000.0
      - MAX_LEVERAGE=5.0
      - MAX_TRADES_PER_DAY=100
      - SIMULATION_MODE=false
      - LEARNING_ENABLED=true
      - SPRING_DATASOURCE_URL=jdbc:postgresql://${DB_HOST:-db}:5432/${DB_NAME:-algotrading_db}
      - SPRING_DATASOURCE_USERNAME=superuser
      - SPRING_DATASOURCE_PASSWORD=${ADMIN_PASSWORD}
    depends_on:
      - upstox-learner
      - db
    volumes:
      - ./algo_trading/BrokerBackends/UpstoxJavaBackend/logs:/app/logs
      - ./algo_trading/BrokerBackends/UpstoxJavaBackend/data:/app/data
    networks:
      - wtvision_net
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8081/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # 11. Trading Predictor Live Dashboard (Streamlit)
  trading-dashboard:
    build:
      context: .
      dockerfile: algo_trading/PredictorFrontend/Dockerfile
    container_name: trading_dashboard
    ports:
      - "8501:8501"
    environment:
      - DB_HOST=${DB_HOST:-db}
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-algotrading_db}
      - DB_USER=superuser
      - DB_PASSWORD=${ADMIN_PASSWORD}
      - DB_SCHEMA=${DB_SCHEMA:-public}
      - JAVA_BACKEND_URL=http://upstox-backend:8081
      - GRPC_SERVER_URL=upstox-learner:50051
    depends_on:
      - upstox-backend
      - upstox-learner
      - db
    networks:
      - wtvision_net

volumes:
  pgdata:
  redis_data:

networks:
  wtvision_net:
    driver: bridge
