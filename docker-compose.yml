services:
  # 1. PostgreSQL Database Service
  db:
    image: postgres:15-alpine
    container_name: wtvision_db
    environment:
      POSTGRES_DB: credentials_db
      POSTGRES_USER: superuser
      POSTGRES_PASSWORD: ${ADMIN_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - wtvision_net

  # 2. JWT Auth Microservice
  jwt_authservice:
    build: ./jwt_authservice
    container_name: wtvision_authservice
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8001"
    environment:
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - DB_HOST=db
      - DB_NAME=credentials_db
      - DB_USER=superuser
      - DB_PORT=5432
    ports:
      - "8001:8001"
    volumes:
      - ./jwt_authservice:/app
    depends_on:
      - db
    networks:
      - wtvision_net

  # 3. Downstream Django API Backend
  wtvisionbe:
    build: ./wtvisionbe
    container_name: wtvision_backend
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    environment:
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - DB_HOST=db
      - DB_NAME=credentials_db
      - DB_USER=superuser
      - DB_PORT=5432
    ports:
      - "8000:8000"
    volumes:
      - ./wtvisionbe:/app
    depends_on:
      - db
    networks:
      - wtvision_net

  # 4. Express API Gateway
  gateway:
    build: ./wtvision-gateway
    container_name: wtvision_gateway
    ports:
      - "80:80"
    environment:
      - PORT=80
      - BACKEND_URL=${BACKEND_URL:-http://wtvisionbe:8000}
      - RENTALS_BACKEND_URL=${RENTALS_BACKEND_URL:-http://rentals_backend:5000}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./wtvision-gateway:/app
      - /app/node_modules
    depends_on:
      - jwt_authservice
      - wtvisionbe
      - rentals_backend
    networks:
      - wtvision_net

  # 5. Next.js React Frontend
  frontend:
    build: ./wtvisionfe
    container_name: wtvision_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./wtvisionfe:/app
      - /app/node_modules
    depends_on:
      - gateway
    networks:
      - wtvision_net

  # 6. Redis Caching & Rate-Limiting Service
  redis:
    image: redis:7-alpine
    container_name: wtvision_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - wtvision_net

  # 7. Rentals Backend Service
  rentals_backend:
    build: ./rentals_app/rentals_backend
    container_name: rentals_backend
    command: sh -c "npx prisma db push && npx tsx src/seed.ts && npm run dev"
    environment:
      - DATABASE_URL=postgresql://superuser:${ADMIN_PASSWORD}@db:5432/credentials_db?schema=rentals
    ports:
      - "5000:5000"
    volumes:
      - ./rentals_app/rentals_backend:/app
      - /app/node_modules
    depends_on:
      - db
    networks:
      - wtvision_net

  # 8. Rentals Frontend Service
  rentals_frontend:
    build: ./rentals_app/rentals_frontend
    container_name: rentals_frontend
    ports:
      - "3001:3001"
    volumes:
      - ./rentals_app/rentals_frontend:/app
      - /app/node_modules
    depends_on:
      - rentals_backend
    networks:
      - wtvision_net

volumes:
  pgdata:
  redis_data:

networks:
  wtvision_net:
    driver: bridge
